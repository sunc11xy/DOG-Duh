<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dogdge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="blindInfoModal" class="modal hidden">
      <div class="modal-card">
        <h2 id="levelInfoTitle">Level Info</h2>
        <p id="levelInfoSummary"></p>
        <ul id="levelInfoList"></ul>
        <button id="closeModalBtn">I understand</button>
      </div>
    </div>
    <div id="leaderboardModal" class="modal hidden">
      <div class="modal-card">
        <h2>Leaderboard (Top 5)</h2>
        <ul id="leaderboardList"></ul>
        <button id="closeLeaderboardBtn">Close</button>
      </div>
    </div>

    <div id="blindTop" class="top-alert">BLIND IN 3.0s</div>
    <div id="sideScore" class="side-score">0s / 0s</div>
    <div id="recordBadge" class="record-badge">NEW RECORD!</div>
    <button id="celebrateBtn" class="celebrate-btn" hidden>Celebrate Again</button>

    <main class="layout">
      <section class="hud">
        <h1>dogdge</h1>
        <p>Move with WASD or with arrows. Survive as long as possible.</p>
        <label for="levelSelect">Level</label>
        <select id="levelSelect">
          <option value="spaghetti">Level 1 - MiniSkirt</option>
          <option value="chu">Level 2 - Chu</option>
          <option value="rude">Level 3 - RUDE!</option>
        </select>
        <div class="customize-panel">
          <div class="customize-title">Customize</div>
          <div class="player-color-row">
            <label for="playerColorPicker">Player Color</label>
            <input id="playerColorPicker" type="color" value="#f2f2f2" aria-label="Choose player color" />
          </div>
          <div class="player-frame-row">
            <label for="playerFramePicker">Player Frame</label>
            <input id="playerFramePicker" type="color" value="#111111" aria-label="Choose player frame color" />
          </div>
          <div class="level3-custom-grid">
            <div class="obstacle-color-row">
              <label for="obstacleColorPicker">Obstacle Color</label>
              <input id="obstacleColorPicker" type="color" value="#ffffff" aria-label="Choose obstacle color" />
            </div>
            <div class="obstacle-frame-row">
              <label for="obstacleFramePicker">Obstacle Frame</label>
              <input id="obstacleFramePicker" type="color" value="#ff69b4" aria-label="Choose obstacle frame color" />
            </div>
          </div>
        </div>
        <div class="stats">
          <span>Score: <strong id="score">0</strong></span>
          <span>Best: <strong id="best">0</strong></span>
          <span>Revives: <strong id="revives">5</strong></span>
        </div>
        <button id="leaderboardBtn">Leaderboard</button>
        <button id="startBtn">Start / Restart</button>
        <button id="continueBtn" hidden>Revive</button>
        <button id="pauseBtn">Pause</button>
      </section>
      <canvas id="game" width="520" height="680" aria-label="dogdge game canvas"></canvas>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
